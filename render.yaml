# Render Blueprint - cria os 3 serviços automaticamente
# Como usar:
#   1. Faça push deste repositório para o GitHub
#   2. No dashboard do Render, clique em "New +" -> "Blueprint"
#   3. Selecione este repositório - o Render lê este arquivo e cria tudo

databases:
  - name: saude-db
    plan: free
    databaseName: saude_db
    user: saude_user

services:
  # ============ BACKEND (Spring Boot / Java) ============
  - type: web
    name: saude-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: saude-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: saude-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: saude-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: saude-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: saude-db
          property: password
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
    healthCheckPath: /api/profissionais

  # ============ FRONTEND (React - site estático) ============
  - type: web
    name: saude-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: saude-backend
          type: web
          property: hostport
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
