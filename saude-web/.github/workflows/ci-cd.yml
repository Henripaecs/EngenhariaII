name: CI/CD - Saúde Web

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ========================
  # TESTES BACKEND (Java)
  # ========================
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Executar testes backend
        working-directory: ./backend
        run: mvn test -B

      - name: Relatório de cobertura (JaCoCo)
        working-directory: ./backend
        run: mvn jacoco:report -B

  # ========================
  # TESTES FRONTEND (React)
  # ========================
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        working-directory: ./frontend
        run: npm install

      - name: Executar testes frontend
        working-directory: ./frontend
        run: npm test -- --watchAll=false --passWithNoTests

  # ========================
  # BUILD DOCKER (só no main)
  # ========================
  build-docker:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build com Docker Compose
        run: docker-compose build

      - name: Testes de aceitação (integração completa)
        run: |
          docker-compose up -d
          sleep 20
          curl -f http://localhost:8080/api/profissionais || exit 1
          curl -f http://localhost:8080/api/atendimentos || exit 1
          docker-compose down
