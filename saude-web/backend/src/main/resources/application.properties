# Configuração do PostgreSQL
# - Localmente: usa DB_HOST/DB_PORT/DB_NAME/DB_USER/DB_PASSWORD (com valores padrão)
# - No Render: defina SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME e
#   SPRING_DATASOURCE_PASSWORD diretamente nas variáveis de ambiente do serviço
#   (essas três sobrescrevem automaticamente as propriedades abaixo)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:saude_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Servidor (Render injeta a variável PORT automaticamente)
server.port=${PORT:8080}

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS - permite o frontend hospedado no Render acessar a API
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
